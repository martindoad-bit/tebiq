  - "持有 在留カード（中长期在留者）"
  - "原住所 + 新住所 都在日本国内"
  - "可能持有 マイナンバーカード（特例転出 适用与否）"
decision_options:
  - id: A
    label: "市区町村内搬家（同一自治体内）"
    when:
      - "新住所 与 旧住所 在同一市町村 / 区"
    actions:
      - "新住所 区役所 / 市役所 → 転居届（住所変更）/ 14 日内"
      - "在留カード 住所変更（同窗口或单独入管 / 14 日内）"
      - "マイナンバーカード 住所書換（同窗口）"
      - "国保 / 年金 / 児童手当 等 住所更新"
  - id: B
    label: "市区町村间搬家 — 紙の転出証明書 経路（旧）"
    when:
      - "无 マイナンバーカード"
      - "或选择不使用 引越しワンストップ"
    actions:
      - "搬家前 旧住所 区役所 → 転出届 → 受领 転出証明書"
      - "搬家后 新住所 区役所 → 持 転出証明書 + 在留カード → 転入届 / 14 日内"
      - "在留カード 住所変更（新住所 区役所 / 入管）"
      - "全体期限：旧住所到新住所 间隔 ≤ 14 日"
  - id: C
    label: "市区町村间搬家 — マイナンバーカード 特例転出（2024 引越しワンストップ）"
    when:
      - "持 マイナンバーカード"
      - "希望 紙の転出証明書 不要"
    actions:
      - "オンライン 転出届 提出（マイナポータル）/ 搬家前后均可"
      - "新住所 区役所 → マイナンバーカード 持参 → 転入届 / 14 日内"
      - "在留カード 住所変更（同窗口 or 入管）"
      - "国保 / 年金 联动办理"
recommended_direction: C
why_not_other_options:
  - "A 市区町村内：选项简单但与 B/C 不同流程，仅当未跨自治体时适用"
  - "B 紙の転出証明書：仍可用但 14 日内必須亲自2 趟（旧 + 新）市役所"
  - "C 特例転出：マイナンバーカード 持有者最优；オンライン + 新住所 1 趟即可"
steps:
  - 1: "決定搬家日 + 新住所 賃貸契約書"
  - 2: "判断 A / B / C 路径（同一自治体？マイナンバーカード？）"
  - 3: "按所选路径执行 转出 + 转入"
  - 4: "在留カード 住所変更（新住所 区役所 14 日内 or 入管）"
  - 5: "国保 / 年金 / 児童手当 / 介護保険 等 联动"
  - 6: "銀行 / 携帯 / 電気 / 水道 / ガス / 郵便 / 各 ID 住所変更"
  - 7: "公司 雇主届出 + 入管 所属機関に関する届出（住所変更が 雇用形態変更を伴う場合）"
today_actions:

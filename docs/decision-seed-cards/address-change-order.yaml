boundary_note: |
  本卡覆盖 日本国内 搬家。
  日本→海外 搬家 = 出国清算（参考 batch-07 china-return-prep）。
  海外→日本 入国时初次手续（参考 batch-07 first-30-days-in-japan）。
  搬家中同時涉及 結婚 / 離婚 / 出産 等家庭状态变化 — 各事件 单独 timeline。
body_markdown: |
  # 搬家 → 多机关变更 联动顺序

  ## 这事跟我有关吗？

  如果你 30 日内即将搬家 / 已搬家但未办手续 → 这张卡适合你。

  ## 这是什么

  搬家不是「搬完就行」— 涉及 区役所 / 入管 / 国保 / 年金 / 银行 / 各 ID 系统联动。
  3 条路径（同自治体内 / 跨自治体 紙経路 / 跨自治体 マイナ特例）→ 推荐 マイナ特例。

  ## 你应该做什么

  按 frontmatter `decision_options` + `steps` 选路径 → 14 日内执行。

  ## 不做的后果

  - 在留カード 住所未届 14 日 → 入管法 19-9 違反、罰金 ¥200,000 以下
  - 住民票 転入未届 14 日 → 過料 ¥50,000 以下
  - 国保未届 → 保険料 遡及徴収（最大 2 年分）
  - マイナンバーカード 失効（90 日経过後）

  ## 什么时候你应该找专家

  搬家与其他重大事件叠加（离婚 / 期限挤压 / 国保减免）时建议咨询 **行政書士**。
  TEBIQ 提供专业咨询服务（[预约](/consultation)）。

  ## 信息来源

  - [在留カード住居地届出](https://www.moj.go.jp/isa/applications/procedures/16-2.html)（取得日 2026-04-30）
  - [住民基本台帳（総務省）](https://www.soumu.go.jp/main_sosiki/jichi_gyousei/c-gyousei/daityo/index.html)（取得日 2026-04-30）
  - [引越しワンストップサービス](https://myna.go.jp/)（取得日 2026-04-30）

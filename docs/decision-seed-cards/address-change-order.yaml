slug: address-change-order
title: "搬家 → 多机关变更 联动顺序 — workflow + 决策混合"
card_type: workflow
answer_level: L2
visa_types:
  - 通用
trigger:
  - "实际搬家日已确定（搬出 + 搬入完了）"
  - "新住所 賃貸契約 / 持家 確定"
  - "外国人持 在留カード 必須联动入管"

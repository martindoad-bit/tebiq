body_markdown: |
  # 永住者 / 工作签 想把父母接来日本长居 — 认知纠偏

  ## 这事跟我有关吗？

  如果你曾这样想 → 这张卡适合你：
  - 「我拿了永住，应该能把爸妈接来吧」
  - 「家族滞在不就是包括家里所有人吗」
  - 「日本有没有像中国探亲签那样的长居证？」

  ## 这是什么（事实）

  日本入管法 別表第二 明确：
  - **家族滞在** 仅含 **配偶者 + 子（実子 / 特別養子）**
  - **父母不属于「家族滞在」对象**
  - 永住者 ≠ 父母自动可长居
  - 日本无中国「探亲签 多次入境长居版」对应制度

  父母可来日本的 **3 条真实路径**：

  | 路径 | 最长期间 | 难度 | 适用条件 |
  |---|---|---|---|
  | 短期滞在（招聘） | 90 日 | 中 | 普遍可，多次入境 |
  | 特定活動（老親扶養） | 1 年（更新可） | 极高（事実上極少下签） | 真有看护需要 + 高齢 + 本人具备照护能力 |
  | 高度専門職 1 号 親族帯同 | 与本人在留期限同 | 高 | 仅 高度専門職 1 号 持有者 + 高家庭年収 |

  ## 你应该做什么

  - 放弃「长居」预期
  - 走 短期滞在 90 日 多次入境策略（一年内可数次入境）
  - 详细操作见 batch-07 `parents-visit-visa.md`

  ## 不做的后果

  - 硬以「家族滞在」名义申请 → 100% 不许可
  - 硬以 短期滞在 滞在超 90 日 → 不法滞在 → 退去強制 + 上陸拒否

  ## 什么时候你应该找专家

  以下情况建议咨询 **行政書士**：
  - 父母确实需要介護 + 本人有照护能力 → 特定活動 老親扶養 ビザ 个別审查
  - 高度専門職 + 親族帯同 申请被拒后异议
  - 父母持外交护照 / 公务护照

  TEBIQ 提供专业咨询服务（[预约](/consultation)）。

  ## 信息来源

  - [在留資格一覧表（出入国在留管理庁）](https://www.moj.go.jp/isa/applications/qaq5.html)（取得日 2026-04-30）
  - [高度専門職 親族帯同](https://www.moj.go.jp/isa/applications/status/koudojinzai.html)（取得日 2026-04-30）
  - [短期滞在 査証案内（外務省）](https://www.mofa.go.jp/mofaj/toko/visa/tanki/visitor.html)（取得日 2026-04-30）

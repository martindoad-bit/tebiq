body_markdown: |
  # 公司休眠 / 倒闭 → 厚生年金 → 国民年金 切换

  ## 这事跟我有关吗？

  如果你符合以下任一条件 → 这张卡适合你：
  - 现公司已决议休眠 / 解散，但你尚未办手续
  - 收到雇主 倒産 / 民事再生 通知
  - 已收到 健康保険資格喪失証明書 但还在拖

  ## 这是什么

  退职 / 雇主倒闭后，原 厚生年金 + 健康保険（社保版）会从 喪失日 起失效。
  日本国民「国民皆保険」原则要求所有居住者 14 日内 必须加入某种公的保险。
  你有 3 条路径：A 国保 + 国民年金（默认）/ B 任意継続 2 年（条件性）/ C 扶養加入（高门槛）。

  ## 你应该做什么

  原则路径 A：14 日内办理 国保 + 国民年金。
  详细决策树见 frontmatter `decision_options`。

  ## 不做的后果

  - 14 日内未办 → 保険料 遡及徴収（最大 2 年分），后日 居住地 市役所 出督促状
  - 永住申請 直近 2 年 公的義務履行 评价负分
  - 病院就诊 → 100% 自費（後日 国保加入後 7 割 還付申請可，但流程繁琐）

  ## 什么时候你应该找专家

  以下情况建议咨询 **社会保険労務士**：
  - 雇主 過去 2 年以上 未缴 厚生年金（本人加入記録缺失）
  - 倒産特例給付（雇用保険）+ 国保軽減 同时申请
  - 配偶扶養加入审查 被拒后异议

  TEBIQ 提供专业咨询服务（[预约](/consultation)）。

  ## 信息来源

  - [国民年金 加入手続き](https://www.nenkin.go.jp/service/kokunen/kanyu-shikumi/index.html)（取得日 2026-04-30）
  - [任意継続被保険者制度](https://www.kyoukaikenpo.or.jp/g3/sb3050/sbb3057/r150/)（取得日 2026-04-30）
  - [国民健康保険 加入・脱退](https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000133698.html)（取得日 2026-04-30）

body_markdown: |
  # 雇主雇错签证 / 资格外活動 — 风险链

  ## 这事跟我有关吗？

  如果你符合任一 → 这张卡适合你：
  - 雇主：考虑或已经雇外国人，但不确定 在留資格 vs 岗位是否合规
  - 雇员：在做的工作 与 在留資格 范围 不一致
  - 已知存在 资格外活動 / 不法就労 风险但还没被查

  ## 这是什么

  日本入管法对「外国人就労」严格按 在留資格 限制：
  - **技人国** = 自然科学 / 人文科学 / 国际业务（限三领域）
  - **留学 / 家族滞在** = 資格外活動許可 範囲内（28 時間 / 週、夏休 8 時間 / 日）
  - **特定技能** = 厚労省 認定 業種

  错配 = **资格外活動**。雇主明知雇用 = **不法就労助長罪**（入管法 73 条 2）。

  ## 风险链（按时间梯度）

  ### 阶段 1：违规进行中（无外部知晓）
  - 表面无事
  - 实质：每月累積 不法就労 期間
  - 后果：续签 / 永住 申请时 直近 5 年 履歴 审查

  ### 阶段 2：入管 / 警察 / 労基署 立入検査 / 通报
  - 出頭通知書 / 質問書
  - 雇主 + 雇员双方调查
  - 后果：调查中 在留資格 暂停审批

  ### 阶段 3：不法就労 認定
  - 雇主：**不法就労助長罪 — 懲役 3 年以下 + 罚金 ¥3,000,000 以下**
  - 雇员：在留資格 取消 + **退去強制** + **上陸拒否 5 年**

  ### 阶段 4：永住 / 帰化 申请封路
  - 直近 5 年 不法就労 履歴 = 不许可
  - 雇主 経営・管理 续签 = 経営実態 + 法令遵守 評価负分

  ## 你应该做什么

  详见 frontmatter `steps`。**今天就做的事**：
  - 查每位外国人雇员 在留カード「就労制限」栏 vs 实际岗位
  - 查 留学 / 家族滞在 持有者 资格外活動許可 + 28 時間 / 週 实绩

  ## 什么时候你应该找专家

  - 已收到 入管 / 警察 / 労基署 出頭通知 / 質問書
  - 已被举报 / 媒体曝光 / 客户反映
  - 累計 5 件以上 違反 / 不法就労 既往

  建议同时咨询 **弁護士（刑事案件）+ 行政書士（在留調整）**。
  TEBIQ 提供专业咨询服务（[预约](/consultation)）。

  ## 信息来源

  - [外国人雇用状況届出（厚労省）](https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/koyou_roudou/koyou/gaikokujin/gaikokujin-koyou/06.html)（取得日 2026-04-30）
  - [在留資格別 就労制限](https://www.moj.go.jp/isa/applications/qaq5.html)（取得日 2026-04-30）
  - [不法就労助長罪 入管法 73 条 2](https://elaws.e-gov.go.jp/document?lawid=326CO0000000319)（取得日 2026-04-30）

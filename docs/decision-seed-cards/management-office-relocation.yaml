body_markdown: |
  # 経営・管理 事務所搬迁 — 7 步 workflow

  ## 这事跟我有关吗？

  如果你符合以下条件 → 这张卡适合你：
  - 现持有 経営・管理 在留資格
  - 公司事務所将在 30 日内搬迁
  - 想知道搬迁完整手续 + 时限 + 不交的后果

  ## 这是什么

  事務所搬迁不是「搬完就行」— 涉及 4 个机关 7 步联动：
  - **法務局** 商業登記（本店移転登記）2 週間以内
  - **出入国在留管理庁** 所属機関等に関する届出 14 日内
  - **年金事務所 / 労基署 / 税務署** 異動届出
  - **取引先 / 銀行** 通知

  ## 你应该做什么

  按 frontmatter `steps` 7 步执行。建议在 新事務所 賃貸契約 签订后立即开始倒推时间表。

  ## 不做的后果

  - 商業登記 遅滞 → 過料 ¥100,000 以下
  - 入管届出 遅滞 → 続签时 経営実態 评价不利
  - 各税務署 異動届 遅滞 → 後日 延滞税 + 課税関係 混乱

  ## 什么时候你应该找专家

  - 搬迁后 新事務所 不符合 独立性 / 業務遂行 適切性 要件
  - 2025/10/16 改正 过渡期内
  - 搬迁同时涉及 役員変更 / 商号変更

  建议咨询 **行政書士**。TEBIQ 提供专业咨询服务（[预约](/consultation)）。

  ## 信息来源

  - [本店移転登記（法務局）](https://houmukyoku.moj.go.jp/homu/COMMERCIAL_8.html)（取得日 2026-04-30）
  - [所属機関等に関する届出](https://www.moj.go.jp/isa/applications/procedures/16-3.html)（取得日 2026-04-30）
  - [事業所変更（年金機構）](https://www.nenkin.go.jp/service/kounen/jigyosho/jigyosho/20141204.html)（取得日 2026-04-30）
